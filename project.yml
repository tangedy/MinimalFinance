name: MinimalFinance
options:
  bundleIdPrefix: com.tangedy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  MinimalFinance:
    type: application
    platform: iOS
    sources:
      - path: MinimalFinance
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tangedy.MinimalFinance
        INFOPLIST_FILE: MinimalFinance/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        DEVELOPMENT_TEAM: ""
    dependencies:
      - sdk: SwiftUI.framework
      - sdk: SwiftData.framework
      - sdk: Charts.framework

schemes:
  MinimalFinance:
    build:
      targets:
        MinimalFinance: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
